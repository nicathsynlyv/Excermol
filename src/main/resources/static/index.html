<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excermol CRM</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3e 50%, #0f1f3f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #fff;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .orbs {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.3;
      animation: float 15s ease-in-out infinite;
    }

    .orb1 {
      width: 300px;
      height: 300px;
      background: rgba(100, 200, 255, 0.5);
      top: -100px;
      left: -100px;
      animation: float 20s ease-in-out infinite;
    }

    .orb2 {
      width: 200px;
      height: 200px;
      background: rgba(200, 100, 255, 0.5);
      bottom: -50px;
      right: -50px;
      animation: float 25s ease-in-out infinite reverse;
    }

    .orb3 {
      width: 250px;
      height: 250px;
      background: rgba(100, 255, 200, 0.5);
      top: 50%;
      right: 10%;
      animation: float 18s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px;
    }

    .logo {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #64c8ff, #c864ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 3s ease-in-out infinite;
    }

    .subtitle {
      font-size: 24px;
      color: #b0b0c0;
      margin-bottom: 40px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 40px 0;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .card-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
    }

    .card-text {
      font-size: 12px;
      color: #999;
    }

    .button {
      margin-top: 40px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #64c8ff, #c864ff);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* ✅ STATUS BAR */
    .status-bar {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(100, 200, 255, 0.15);
      border: 1px solid rgba(100, 200, 255, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #64c8ff;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(10px);
    }

    .pulse {
      width: 8px;
      height: 8px;
      background: #64c8ff;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #clock {
      font-family: monospace;
      color: #fff;
      margin-left: 8px;
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 20px rgba(100, 200, 255, 0.5); }
      50% { text-shadow: 0 0 40px rgba(200, 100, 255, 0.8); }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="content">
    <div class="logo">✨ EXCERMOL</div>
    <div class="subtitle">Customer Relationship Management</div>

    <div class="cards-grid">
      <div class="card">
        <div class="card-icon">👥</div>
        <div class="card-title">Contacts</div>
        <div class="card-text">Manage customers</div>
      </div>

      <div class="card">
        <div class="card-icon">🏢</div>
        <div class="card-title">Companies</div>
        <div class="card-text">Track deals</div>
      </div>

      <div class="card">
        <div class="card-icon">📊</div>
        <div class="card-title">Campaigns</div>
        <div class="card-text">Marketing</div>
      </div>

      <div class="card">
        <div class="card-icon">📈</div>
        <div class="card-title">Analytics</div>
        <div class="card-text">Insights</div>
      </div>
    </div>

    <button class="button" onclick="alert('Coming soon!')">Get Started</button>
  </div>

  <!-- ✅ STATUS BAR + CLOCK -->
  <div class="status-bar">
    <div class="pulse"></div>
    <span>Backend API Ready</span>
    <span id="clock"></span>
  </div>
</div>

<!-- ✅ CLOCK SCRIPT -->
<script>
  function updateClock() {
    const now = new Date();

    let h = String(now.getHours()).padStart(2, '0');
    let m = String(now.getMinutes()).padStart(2, '0');
    let s = String(now.getSeconds()).padStart(2, '0');

    document.getElementById("clock").innerText = `${h}:${m}:${s}`;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>

</body>
</html>
